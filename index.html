<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support - Kontakt oss</title>
    <style>
        :root {
            --sb1-blue: #003057;
            --sb1-light-blue: #0072c1;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 40px 20px;
            background-color: white;
            color: var(--sb1-blue);
        }

        .employee-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 40px 20px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .employee-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .image-wrapper {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            overflow: hidden;
            margin-bottom: 15px;
            background-color: #f4f4f4;
        }

        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .name {
            font-size: 1.15rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .role {
            font-size: 0.95rem;
            margin-bottom: 8px;
            color: #444;
        }

        .phone {
            font-size: 0.95rem;
            font-weight: bold;
            text-decoration: none;
            color: inherit;
            margin-bottom: 5px;
        }

        .email-link {
            font-size: 0.95rem;
            color: var(--sb1-light-blue);
            text-decoration: underline;
        }

        #error-msg { text-align: center; color: red; display: none; }
    </style>
</head>
<body>

    <div id="error-msg">Kunne ikke laste ansattliste. Sjekk at employees.json er riktig formatert.</div>
    <div class="employee-grid" id="staff-list"></div>

    <script>
        async function fetchStaff() {
            try {
                // Henter data fra den separate JSON-filen
                const response = await fetch('employees.json');
                if (!response.ok) throw new Error('Fant ikke JSON-fil');
                
                const employees = await response.json();
                const container = document.getElementById('staff-list');

                container.innerHTML = employees.map(emp => `
                    <div class="employee-card">
                        <div class="image-wrapper">
                            <img src="${emp.img}" alt="${emp.name}" onerror="this.src='https://www.sparebank1.no/etc.clientlibs/s1-platform/clientlibs/clientlib-site/resources/images/avatar.svg'">
                        </div>
                        <div class="name">${emp.name}</div>
                        <div class="role">${emp.role}</div>
                        <div class="phone">Tlf. ${emp.phone}</div>
                        <a href="mailto:${emp.email}" class="email-link">e-post</a>
                    </div>
                `).join('');

            } catch (error) {
                console.error(error);
                document.getElementById('error-msg').style.display = 'block';
            }
        }

        fetchStaff();
    </script>
</body>
</html>
